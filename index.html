<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול משימות - פרויקט סיום</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="app"></div>

    <div id="loader" class="loader-hidden">
        <div class="spinner"></div>
        <p>מתקשר עם השרת...</p>
    </div>

    <div id="custom-modal" class="modal-hidden">
        <div class="modal-content">
            <p id="modal-message"></p>
            <button onclick="app.closeModal()" class="primary-btn">הבנתי, תודה</button>
        </div>
    </div>

    <template id="login-template">
        <div class="auth-card login-style">
            <h2>כניסה למערכת</h2>
            <form id="login-form">
                <div class="input-group">
                    <label>כתובת אימייל:</label>
                    <input type="email" name="email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label>סיסמה:</label>
                    <input type="password" name="password" placeholder="הכנס סיסמה" required>
                </div>
                <button type="submit" class="primary-btn">התחבר</button>
            </form>
            <p class="switch-auth">
                אין לך חשבון? <span onclick="app.navigateTo('register-template')">הירשם כאן</span>
            </p>
        </div>
    </template>

    <template id="register-template">
        <div class="auth-card register-style">
            <h2>יצירת חשבון חדש</h2>
            <form id="register-form">
                <div class="input-group">
                    <label>שם מלא:</label>
                    <input type="text" name="username" placeholder="הכנס שם מלא" required>
                </div>
                <div class="input-group">
                    <label>כתובת אימייל:</label>
                    <input type="email" name="email" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label>בחר סיסמה:</label>
                    <input type="password" name="password" placeholder="לפחות 6 תווים, אות ומספר" required>
                </div>
                <div class="input-group">
                    <label>אימות סיסמה:</label>
                    <input type="password" name="confirmPassword" placeholder="הקש את הסיסמה שנית" required>
                </div>
                <button type="submit" class="primary-btn green-btn">הירשם עכשיו</button>
            </form>
            <p class="switch-auth">
                כבר רשום? <span onclick="app.navigateTo('login-template')">חזור לכניסה</span>
            </p>
        </div>
    </template>

    <template id="main-app-template">
        <div class="main-layout">
            <header>
                <div class="user-info">שלום, <strong id="user-display-name"></strong> 👋</div>
                <button id="logout-btn" class="logout-link">התנתק</button>
            </header>
            <main>
                <div class="content-card">
                    <h3>המשימות שלי</h3>
                    
                    <form id="add-task-form" class="task-form-extended">
                        <input type="text" name="title" placeholder="כותרת המשימה" required>
                        <textarea name="description" placeholder="תיאור (אופציונלי)"></textarea>
                        <div class="form-row">
                            <div class="field">
                                <label>תאריך:</label>
                                <input type="date" name="dueDate">
                            </div>
                            <div class="field">
                                <label>עדיפות:</label>
                                <select name="priority">
                                    <option value="low">נמוכה 🟢</option>
                                    <option value="medium" selected>בינונית 🟡</option>
                                    <option value="high">גבוהה 🔴</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>רשימה:</label>
                                <select name="category">
                                    <option value="personal">אישי 💖</option>
                                    <option value="work">עבודה 💼</option>
                                    <option value="studies">לימודים 📚</option>
                                    <option value="gym">חדר כושר 🏋️</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="add-btn">+ הוסף משימה</button>
                    </form>

                    <div class="category-filters">
                        <button class="filter-btn" onclick="app.filterByCategory('all')">הכל</button>
                        <button class="filter-btn" onclick="app.filterByCategory('studies')">📚 לימודים</button>
                        <button class="filter-btn" onclick="app.filterByCategory('work')">💼 עבודה</button>
                        <button class="filter-btn" onclick="app.filterByCategory('gym')">🏋️ חדר כושר</button>
                        <button class="filter-btn" onclick="app.filterByCategory('personal')">💖 אישי</button>
                    </div>

                    <div id="data-list"></div>
                </div>
            </main>
        </div>
    </template>

    <!-- ✅ תוקן: כל שדות הטופס בתוך ה-form, כולל input נסתר ל-id -->
    <div id="edit-task-modal" class="modal-hidden">
        <div class="modal-content">
            <h3>עריכת משימה</h3>
            <div class="task-identity-display">
                <span id="display-task-category"></span>
                <strong id="display-task-title"></strong>
            </div>

            <form id="edit-task-form" class="task-form-extended">
                <!-- שדה נסתר לשמירת ה-id של המשימה הנערכת -->
                <input type="hidden" name="id">

                <textarea name="description" placeholder="עדכן תיאור המשימה"></textarea>

                <div class="form-row">
                    <div class="field">
                        <label>תאריך:</label>
                        <input type="date" name="dueDate">
                    </div>
                    <div class="field">
                        <label>עדיפות:</label>
                        <select name="priority">
                            <option value="low">נמוכה 🟢</option>
                            <option value="medium">בינונית 🟡</option>
                            <option value="high">גבוהה 🔴</option>
                        </select>
                    </div>
                </div>

                <div class="modal-actions-container">
                    <button type="submit" class="save-btn">שמור שינויים</button>
                    <button type="button" onclick="app.closeEditModal()" class="cancel-btn">ביטול</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/server-auth.js"></script>
    <script src="js/server-app.js"></script>
    <script src="js/network.js"></script>
    <script src="js/fajax.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
